<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ChaiDev</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍵</text></svg>" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #fbfaf6; }
  .markdown-body {
    box-sizing: border-box;
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 28px 120px;
    background: transparent;
  }
  .markdown-body :target { scroll-margin-top: 24px; }
  aside.toc {
    position: fixed;
    top: 64px;
    left: max(28px, calc((100vw - 1180px) / 2));
    width: 220px;
    max-height: calc(100vh - 128px);
    overflow-y: auto;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  aside.toc .toc-label {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #6e7781;
    font-size: 11px;
    margin: 0 0 14px;
    font-weight: 600;
  }
  aside.toc ul { list-style: none; padding: 0; margin: 0; }
  aside.toc li { margin-bottom: 6px; }
  aside.toc a {
    color: #444;
    text-decoration: none;
    display: block;
    padding: 2px 0;
  }
  aside.toc a:hover, aside.toc a.active { color: #0969da; font-weight: 600; }
  aside.toc .toc-h3 { padding-left: 14px; font-size: 12px; color: #6e7781; }
  @media (max-width: 1180px) { aside.toc { display: none; } }
</style>
</head>
<body>
<aside class="toc" id="toc" hidden></aside>
<article class="markdown-body" id="content"><p>Loading…</p></article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ gfm: true, breaks: false });

  function slugify(t) {
    return t.toLowerCase().replace(/[^\w\s-]+/g, '').trim().replace(/\s+/g, '-').replace(/-+/g, '-');
  }

  function buildTOC() {
    const all = document.querySelectorAll('#content h1, #content h2, #content h3');
    if (!all.length) return;
    const used = new Set();
    all.forEach(h => {
      if (!h.id) {
        let base = slugify(h.textContent) || 'section', id = base, n = 1;
        while (used.has(id)) id = `${base}-${++n}`;
        h.id = id;
      }
      used.add(h.id);
    });
    const tocHeadings = document.querySelectorAll('#content h2, #content h3');
    if (!tocHeadings.length) return;
    const toc = document.getElementById('toc');
    let html = '<div class="toc-label">Contents</div><ul>';
    tocHeadings.forEach(h => {
      const cls = h.tagName === 'H3' ? 'toc-h3' : '';
      html += `<li><a href="#${h.id}" class="${cls}" data-target="${h.id}">${h.textContent.trim()}</a></li>`;
    });
    toc.innerHTML = html + '</ul>';
    toc.hidden = false;
    const links = document.querySelectorAll('aside.toc a');
    const linkById = {};
    links.forEach(a => linkById[a.dataset.target] = a);
    new IntersectionObserver(entries => {
      entries.forEach(e => {
        const link = linkById[e.target.id];
        if (link && e.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          link.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' }).observe;
    tocHeadings.forEach(h => {
      const obs = new IntersectionObserver(entries => entries.forEach(e => {
        const link = linkById[e.target.id];
        if (link && e.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          link.classList.add('active');
        }
      }), { rootMargin: '-20% 0px -70% 0px' });
      obs.observe(h);
    });
  }

  fetch('/home.md')
    .then(r => r.ok ? r.text() : Promise.reject('HTTP ' + r.status))
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      buildTOC();
      // re-trigger fragment scroll now that headings have IDs
      if (window.location.hash) {
        const target = document.getElementById(decodeURIComponent(window.location.hash.slice(1)));
        if (target) target.scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    })
    .catch(err => {
      document.getElementById('content').innerHTML = '<p>Error loading document: ' + err + '</p>';
    });
</script>
</body>
</html>
